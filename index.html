<!DOCTYPE html>
<html>
<head>
<title>Racing Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#gameArea{
width:400px;
height:600px;
background:gray;
margin:auto;
position:relative;
overflow:hidden;
}

.car{
width:40px;
height:80px;
background:red;
position:absolute;
bottom:20px;
left:180px;
}

.enemy{
width:40px;
height:80px;
background:yellow;
position:absolute;
top:-100px;
}

#score{
color:white;
text-align:center;
font-size:20px;
}
</style>
</head>

<body>

<h2 id="score">Score: 0</h2>

<div id="gameArea">
<div id="player" class="car"></div>
</div>

<script>

let player=document.getElementById("player")
let gameArea=document.getElementById("gameArea")
let score=0
let x=180

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowLeft"){x-=20}
if(e.key=="ArrowRight"){x+=20}
player.style.left=x+"px"
})

function createEnemy(){
let enemy=document.createElement("div")
enemy.classList.add("enemy")
enemy.style.left=Math.floor(Math.random()*360)+"px"
gameArea.appendChild(enemy)

let y=-100

let move=setInterval(()=>{
y+=5
enemy.style.top=y+"px"

if(y>600){
enemy.remove()
score++
document.getElementById("score").innerText="Score: "+score
clearInterval(move)
}

},30)
}

setInterval(createEnemy,2000)

</script>

</body>
</html>
